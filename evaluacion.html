<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial - Sistema Clínico PRO</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNmNtKELNgO40l4wJKq6iNjwlEDPLQ1D8",
  authDomain: "psicohealt-3cbbd.firebaseapp.com",
  projectId: "psicohealt-3cbbd"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 Persistencia offline real
firebase.firestore().enablePersistence()
.catch(()=> console.log("Persistencia no disponible"));
</script>

<style>
body {font-family: Arial; margin:0; background:#f0f4f8;}
header {
    background:#0288d1;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
button {
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#0288d1;
    color:white;
}
.container {padding:20px;}
input, textarea {
    padding:10px;
    margin:5px;
    width:250px;
    border-radius:8px;
    border:1px solid #ccc;
}
.card {
    background:white;
    margin:15px auto;
    padding:15px;
    border-radius:10px;
    width:340px;
}
.historial {
    background:#ffe0e0;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
.btn-eliminar {background:red;}
.loading {text-align:center; margin-top:20px;}
</style>
</head>

<body>

<header>
    <button onclick="window.location.href='index.html'">🏠</button>
    <h3>Historial de Pacientes</h3>
    <button onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">

<h3>Agregar paciente</h3>
<input id="nombre" placeholder="Nombre">
<input id="edad" type="number" placeholder="Edad">
<button onclick="crearPaciente()">Guardar</button>

<h3>Buscar</h3>
<input id="busqueda" onkeyup="buscarPaciente()" placeholder="Buscar">

<div id="lista"></div>
<div id="loading" class="loading">Cargando...</div>

</div>

<script>
let pacientes = [];

// 🔐 SESIÓN
auth.onAuthStateChanged(user=>{
    if(!user){
        window.location.href="index.html";
    } else {
        cargarPacientes();
    }
});

function logout(){ auth.signOut(); }

// ➕ CREAR PACIENTE (SUBCOLECCIÓN)
async function crearPaciente(){
    const nombre = document.getElementById("nombre").value.trim();
    const edad = parseInt(document.getElementById("edad").value);

    if(nombre === "" || edad <= 0){
        alert("Datos inválidos");
        return;
    }

    const user = auth.currentUser;

    await db.collection("usuarios")
    .doc(user.uid)
    .collection("pacientes")
    .add({
        nombre,
        edad,
        historial: []
    });

    document.getElementById("nombre").value="";
    document.getElementById("edad").value="";

    cargarPacientes();
}

// 📥 CARGAR PACIENTES
async function cargarPacientes(){
    const user = auth.currentUser;
    document.getElementById("loading").style.display="block";

    const snapshot = await db.collection("usuarios")
    .doc(user.uid)
    .collection("pacientes")
    .get();

    pacientes = [];

    snapshot.forEach(doc=>{
        pacientes.push({ id: doc.id, ...doc.data() });
    });

    document.getElementById("loading").style.display="none";
    mostrarPacientes();
}

// 📝 NUEVO REGISTRO
function nuevoRegistro(id){
    document.getElementById("form-"+id).innerHTML = `
    <input id="noPuede${id}" placeholder="No puede hacer"><br>
    <textarea id="obs${id}" placeholder="Observaciones"></textarea><br>
    <button onclick="guardarRegistro('${id}')">Guardar</button>`;
}

// 💾 GUARDAR REGISTRO
async function guardarRegistro(id){
    const noPuede = document.getElementById("noPuede"+id).value;
    const obs = document.getElementById("obs"+id).value;

    if(!noPuede && !obs){
        alert("Escribe algo");
        return;
    }

    const user = auth.currentUser;

    const ref = db.collection("usuarios")
    .doc(user.uid)
    .collection("pacientes")
    .doc(id);

    const doc = await ref.get();
    const data = doc.data();

    data.historial.push({
        fecha: new Date().toLocaleDateString(),
        noPuede,
        obs
    });

    await ref.update({ historial: data.historial });

    cargarPacientes();
}

// 🗑️ ELIMINAR PACIENTE
async function eliminarPaciente(id){
    if(!confirm("Eliminar paciente?")) return;

    const user = auth.currentUser;

    await db.collection("usuarios")
    .doc(user.uid)
    .collection("pacientes")
    .doc(id)
    .delete();

    cargarPacientes();
}

// 🔍 BUSCAR
function buscarPaciente(){
    const texto = document.getElementById("busqueda").value.toLowerCase();
    mostrarPacientes(texto);
}

// 📋 MOSTRAR
function mostrarPacientes(filtro=""){
    const lista = document.getElementById("lista");
    lista.innerHTML="";

    pacientes.forEach(p=>{
        if(p.nombre.toLowerCase().includes(filtro)){

            let hist = "";

            (p.historial || []).forEach((h,i)=>{
                hist += `
                <div class="historial">
                    <b>${h.fecha}</b><br>
                    ❌ ${h.noPuede}<br>
                    📝 ${h.obs}
                </div>`;
            });

            lista.innerHTML += `
            <div class="card">
                <h3>${p.nombre}</h3>
                Edad: ${p.edad}<br>

                <button onclick="nuevoRegistro('${p.id}')">➕ Registro</button>
                <button class="btn-eliminar" onclick="eliminarPaciente('${p.id}')">🗑️</button>

                <div id="form-${p.id}"></div>
                ${hist}
            </div>`;
        }
    });
}
</script>

</body>
</html>
