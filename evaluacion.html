<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación del Paciente</title>

<style>
body {
    font-family: Arial;
    background:#f0f4f8;
    margin:0;
}

/* HEADER */
header {
    background:#0288d1;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn-home {
    background:white;
    color:#0288d1;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* CONTENIDO */
.container {
    padding:20px;
    text-align:center;
}

input {
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin:5px;
}

button {
    padding:10px 15px;
    background:#0288d1;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.card {
    background:white;
    margin:15px auto;
    padding:15px;
    border-radius:10px;
    width:320px;
    text-align:left;
}

.resultado {
    background:#e3f2fd;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
    <button class="btn-home" onclick="window.location.href='index.html'">🏠 Inicio</button>
    <h2>Evaluación</h2>
</header>

<div class="container">

<h3>Edad del paciente</h3>
<input type="number" id="edad" placeholder="Edad">
<button onclick="evaluar()">Evaluar</button>

<div id="habilidades"></div>

<button onclick="generar()">Generar recomendaciones</button>

<div id="resultado"></div>

</div>

<script>

// HABILIDADES POR EDAD
function obtenerHabilidades(edad){
    if(edad >= 12){
        return ["desarrollar habilidades sociales","tomar decisiones","planificar el futuro"];
    } else if(edad >= 10){
        return ["escribir","resolver problemas matematicos"];
    } else if(edad >= 5){
        return ["saltar","dibujar","hablar"];
    } else if(edad >= 2){
        return ["caminar","decir palabras sencillas"];
    } else {
        return ["girar la cabeza","sonreir","llorar"];
    }
}

// SUGERENCIAS (de tu Python)
const sugerencias = {
    "girar la cabeza": ["Ejercicios visuales con juguetes", "Mover objetos a los lados"],
    "sonreir": ["Juegos de imitación", "Gestos y sonidos alegres"],
    "llorar": ["Observar estímulos", "Asegurar confort"],
    "caminar": ["Juegos de equilibrio", "Caminar con apoyo"],
    "decir palabras sencillas": ["Leer cuentos", "Repetir palabras"],
    "saltar": ["Saltos en colchoneta", "Juegos con cuerda"],
    "dibujar": ["Colorear", "Trazar formas"],
    "hablar": ["Conversaciones", "Cantar canciones"],
    "escribir": ["Trazar letras", "Copiar palabras"],
    "resolver problemas matematicos": ["Contar objetos", "Sumas simples"],
    "desarrollar habilidades sociales": ["Juegos grupales", "Dinámicas sociales"],
    "tomar decisiones": ["Elegir opciones", "Resolver situaciones"],
    "planificar el futuro": ["Metas simples", "Organizar actividades"]
};

let habilidades = [];

// MOSTRAR HABILIDADES
function evaluar(){
    let edad = document.getElementById("edad").value;
    let cont = document.getElementById("habilidades");

    habilidades = obtenerHabilidades(edad);

    cont.innerHTML = "<h3>¿Qué NO puede hacer?</h3>";

    habilidades.forEach((h,i)=>{
        cont.innerHTML += `
        <div>
            <input type="checkbox" value="${h}">
            ${h}
        </div>`;
    });
}

// GENERAR RESULTADO
function generar(){
    let checks = document.querySelectorAll("input[type=checkbox]:checked");
    let resultado = document.getElementById("resultado");

    resultado.innerHTML = "";

    if(checks.length === 0){
        resultado.innerHTML = "<div class='card'>✅ El paciente puede realizar todas las habilidades.</div>";
        return;
    }

    checks.forEach(c=>{
        let habilidad = c.value;

        let lista = sugerencias[habilidad] || ["Actividad personalizada"];

        let html = `
        <div class="card">
            <h3>${habilidad}</h3>
        `;

        lista.forEach(s=>{
            html += `<div class="resultado">- ${s}</div>`;
        });

        html += `
            <div class="resultado">✍️ Agrega tus propias observaciones</div>
        </div>`;

        resultado.innerHTML += html;
    });
}

</script>

</body>
</html>
