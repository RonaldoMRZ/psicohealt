<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación del Paciente</title>

<style>
body {
    font-family: Arial;
    background:#f0f4f8;
    margin:0;
}

/* HEADER */
header {
    background:#0288d1;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn-home {
    background:white;
    color:#0288d1;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* CONTENIDO */
.container {
    padding:20px;
    text-align:center;
}

input {
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin:5px;
    width:250px;
}

button {
    padding:10px 15px;
    background:#0288d1;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

/* TARJETAS */
.card {
    background:white;
    margin:20px auto;
    padding:15px;
    border-radius:10px;
    width:350px;
    text-align:left;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* CHECKBOX */
.check-item {
    display:flex;
    align-items:center;
    gap:10px;
    margin:8px 0;
    padding:8px;
    border-radius:8px;
    transition:0.3s;
    cursor:pointer;
}

/* hover */
.check-item:hover {
    background:#e3f2fd;
}

/* seleccionado */
.check-item.activo {
    background:#ffebee;
    border-left:5px solid red;
}

/* texto seleccionado */
.check-item.activo label {
    color:red;
    font-weight:bold;
}

/* RESULTADO */
.resultado {
    background:#e3f2fd;
    padding:8px;
    border-radius:6px;
    margin-top:5px;
}

/* CONTENEDOR CHECKS */
#listaChecks {
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* MARCOS */
.marco-img {
    width:100%;
    height:200px;
    border:2px dashed #0288d1;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f9f9f9;
}

.marco-img img {
    max-width:100%;
    max-height:100%;
    border-radius:8px;
}

.marco-video {
    width:100%;
    height:200px;
    border:2px dashed #0288d1;
    border-radius:10px;
    overflow:hidden;
    background:black;
}

.marco-video iframe {
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<header>
    <button class="btn-home" onclick="window.location.href='index.html'">🏠 Inicio</button>
    <h2>Evaluación</h2>
    <div></div>
</header>

<div class="container">

<h3>Edad del paciente</h3>
<input type="number" id="edad" placeholder="Edad">
<button onclick="evaluar()">Evaluar</button>

<div id="habilidades"></div>

<button onclick="generar()">Generar recomendaciones</button>

<div id="resultado"></div>

</div>

<script>

// HABILIDADES
function obtenerHabilidades(edad){
    if(edad >= 12){
        return ["desarrollar habilidades sociales","tomar decisiones","planificar el futuro"];
    } else if(edad >= 10){
        return ["escribir","resolver problemas matematicos"];
    } else if(edad >= 5){
        return ["saltar","dibujar","hablar"];
    } else if(edad >= 2){
        return ["caminar","decir palabras sencillas"];
    } else {
        return ["girar la cabeza","sonreir","llorar"];
    }
}

// EJERCICIOS
const sugerencias = {
    "caminar": ["Caminar con apoyo","Ejercicios de equilibrio"],
    "hablar": ["Repetición de palabras","Leer cuentos"],
    "saltar": ["Saltos en colchoneta","Juego con cuerda"],
    "dibujar": ["Colorear","Trazar líneas"],
    "escribir": ["Copiar palabras","Trazar letras"],
    "resolver problemas matematicos": ["Contar objetos","Sumas simples"],
    "desarrollar habilidades sociales": ["Juegos grupales","Interacción social"],
    "tomar decisiones": ["Elegir opciones","Resolver situaciones"],
    "planificar el futuro": ["Metas simples","Organizar actividades"],
    "decir palabras sencillas": ["Repetición","Asociar imágenes"],
    "girar la cabeza": ["Seguimiento visual","Mover objetos"],
    "sonreir": ["Imitación facial","Juegos"],
    "llorar": ["Reconocer emociones","Estimulación"]
};

let habilidades = [];

// MOSTRAR HABILIDADES
function evaluar(){
    let edad = document.getElementById("edad").value;
    let cont = document.getElementById("habilidades");

    habilidades = obtenerHabilidades(edad);

    cont.innerHTML = `
    <h3>Selecciona lo que NO puede hacer:</h3>
    <div id="listaChecks"></div>
    `;

    let lista = document.getElementById("listaChecks");

    habilidades.forEach((h,i)=>{
        lista.innerHTML += `
        <div class="check-item" onclick="toggleCheck(${i})">
            <input type="checkbox" id="check${i}" value="${h}">
            <label>${h}</label>
        </div>`;
    });
}

// ACTIVAR CHECK
function toggleCheck(i){
    let check = document.getElementById("check"+i);
    let item = check.parentElement;

    check.checked = !check.checked;

    if(check.checked){
        item.classList.add("activo");
    } else {
        item.classList.remove("activo");
    }
}

// GENERAR RESULTADOS
function generar(){
    let checks = document.querySelectorAll("input[type=checkbox]:checked");
    let resultado = document.getElementById("resultado");

    resultado.innerHTML = "";

    if(checks.length === 0){
        resultado.innerHTML = "<div class='card'>✅ El paciente puede realizar todas las habilidades.</div>";
        return;
    }

    checks.forEach((c)=>{
        let habilidad = c.value;
        let lista = sugerencias[habilidad] || ["Actividad personalizada"];

        let html = `<div class="card">
        <h3>${habilidad}</h3>`;

        lista.forEach(e=>{
            html += `<div class="resultado">✔ ${e}</div>`;
        });

        html += `
        <br>
        <b>Imagen del ejercicio:</b>
        <div class="marco-img">
            <img src="">
        </div>

        <br>

        <b>Video del ejercicio:</b>
        <div class="marco-video">
            <iframe src=""></iframe>
        </div>

        </div>`;

        resultado.innerHTML += html;
    });
}

</script>

</body>
</html>
