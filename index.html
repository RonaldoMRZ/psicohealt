<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación del Paciente</title>

<!-- FUENTES Y ESTILO MODERNO -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto', Arial, sans-serif;
    background: #f0f4f8;
    margin: 0;
    padding: 0;
    color: #333;
}

header {
    background: #4a90e2;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

input, button {
    padding: 10px;
    font-size: 16px;
    margin: 5px;
}

button {
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #357ABD;
}

h2 {
    color: #4a90e2;
    margin-top: 20px;
}

.habilidades-list div {
    margin: 8px 0;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin: 15px 0;
    box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card img {
    width: 150px;
    margin: 10px 0;
    border-radius: 10px;
}

.card video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

@media (max-width: 600px) {
    .card {
        width: 90%;
    }
}
</style>
</head>

<body>

<header>Evaluación del Paciente</header>

<div class="container">
    <div>
        <input type="number" id="edad" placeholder="Edad">
        <button onclick="evaluar()">Evaluar</button>
    </div>

    <div class="habilidades-list" id="habilidades"></div>

    <button onclick="recomendar()">Recomendar ejercicios</button>

    <div id="resultados"></div>
</div>

<script>
// HABILIDADES POR EDAD
function obtenerHabilidades(edad){
    if(edad >= 12){
        return ["desarrollar habilidades sociales","tomar decisiones","planificar el futuro"];
    } else if(edad >= 10){
        return ["escribir","resolver problemas matematicos"];
    } else if(edad >= 5){
        return ["saltar","dibujar","hablar"];
    } else if(edad >= 2){
        return ["caminar","decir palabras sencillas"];
    } else {
        return ["girar la cabeza","sonreir","llorar"];
    }
}

// EJERCICIOS + IMAGEN + VIDEO
const ejercicios = {
    "caminar": {
        texto: "Caminar con apoyo",
        img: "caminar.png",
        video: "caminar.mp4"
    },
    "hablar": {
        texto: "Practicar palabras",
        img: "hablar.png",
        video: "hablar.mp4"
    },
    "saltar": {
        texto: "Saltos en colchoneta",
        img: "saltar.png",
        video: "saltar.mp4"
    },
    "dibujar": {
        texto: "Dibujar con colores",
        img: "dibujar.png",
        video: "dibujar.mp4"
    },
    "escribir": {
        texto: "Practicar escritura",
        img: "escribir.png",
        video: "escribir.mp4"
    },
    "resolver problemas matematicos": {
        texto: "Ejercicios de matemáticas simples",
        img: "matematicas.png",
        video: "matematicas.mp4"
    },
    "desarrollar habilidades sociales": {
        texto: "Juegos grupales y comunicación",
        img: "social.png",
        video: "social.mp4"
    },
    "tomar decisiones": {
        texto: "Actividades de elección y consecuencias",
        img: "decidir.png",
        video: "decidir.mp4"
    },
    "planificar el futuro": {
        texto: "Pequeños proyectos y metas",
        img: "plan.png",
        video: "plan.mp4"
    },
    "decir palabras sencillas": {
        texto: "Repetir palabras y canciones",
        img: "palabras.png",
        video: "palabras.mp4"
    },
    "girar la cabeza": {
        texto: "Ejercicios de seguimiento visual",
        img: "cabeza.png",
        video: "cabeza.mp4"
    },
    "sonreir": {
        texto: "Juegos de expresión facial",
        img: "sonreir.png",
        video: "sonreir.mp4"
    },
    "llorar": {
        texto: "Reconocer emociones",
        img: "llorar.png",
        video: "llorar.mp4"
    }
};

let habilidadesActuales = [];

// MOSTRAR HABILIDADES
function evaluar(){
    let edad = document.getElementById("edad").value;
    let contenedor = document.getElementById("habilidades");
    contenedor.innerHTML = "";

    habilidadesActuales = obtenerHabilidades(edad);

    habilidadesActuales.forEach(h => {
        contenedor.innerHTML += `
            <div>
                <input type="checkbox" value="${h}"> ${h}
            </div>
        `;
    });
}

// RECOMENDACIONES
function recomendar(){
    let seleccionados = document.querySelectorAll("input[type=checkbox]:checked");
    let resultados = document.getElementById("resultados");
    resultados.innerHTML = "";

    seleccionados.forEach(el => {
        let h = el.value;
        let info = ejercicios[h];

        // Si no hay info, crear recomendación genérica
        if(!info){
            info = {
                texto: "Realizar actividad relacionada con: " + h,
                img: "default.png",
                video: "default.mp4"
            };
        }

        resultados.innerHTML += `
            <div class="card">
                <h3>${h}</h3>
                <p>${info.texto}</p>
                <img src="${info.img}" alt="${h}">
                <video controls>
                    <source src="${info.video}" type="video/mp4">
                </video>
            </div>
        `;
    });
}
</script>

</body>
</html>
