<style>
body {font-family: Arial; margin:0; background:#f0f4f8;}
header {background:#0288d1;color:white;padding:20px;text-align:center;font-size:24px;}
.container {padding:20px;text-align:center;}
button {padding:10px 20px;margin:10px;background:#0288d1;color:white;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>
<header>🏥 Sistema Clínico</header>

<div class="container" id="home">
    <h2>Bienvenido al Sistema Clínico</h2>
    <p>Gestiona pacientes, historial y evaluaciones</p>
    <div id="home-buttons" style="display:none;">
        <button onclick="window.location.href='historial.html'">📋 Historial</button>
        <button onclick="window.location.href='evaluacion.html'">📝 Evaluación</button>
        <button style="background:red;" onclick="logout()">Cerrar sesión</button>
    </div>

    <div id="login">
        <h2>Login</h2>
        <input id="email" placeholder="Correo"><br>
        <input id="password" type="password" placeholder="Contraseña"><br>
        <button onclick="login()">Entrar</button>
        <button onclick="register()">Registrarse</button>
    </div>
</div>

<script>
function register(){
    const emailVal = document.getElementById("email").value;
    const passwordVal = document.getElementById("password").value;
    if(!emailVal || !passwordVal){ alert("Ingresa correo y contraseña"); return; }
    auth.createUserWithEmailAndPassword(emailVal,passwordVal)
        .then(()=>alert("Usuario creado correctamente"))
        .catch(e=>alert("Error: "+e.message));
}

function login(){
    const emailVal = document.getElementById("email").value;
    const passwordVal = document.getElementById("password").value;
    if(!emailVal || !passwordVal){ alert("Ingresa correo y contraseña"); return; }
    auth.signInWithEmailAndPassword(emailVal,passwordVal)
        .catch(e=>alert("Error: "+e.message));
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("login").style.display="none";
        document.getElementById("home-buttons").style.display="block";
    } else {
        document.getElementById("login").style.display="block";
        document.getElementById("home-buttons").style.display="none";
    }
});
</script>

</body>
</html>
