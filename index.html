<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación del Paciente</title>

<!-- FUENTE MODERNA -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* RESET Y ESTILO BASE */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #fff3e0);
    color: #333;
}

/* HEADER */
header {
    background: #0288d1;
    color: white;
    text-align: center;
    padding: 25px 0;
    font-size: 28px;
    font-weight: 700;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    letter-spacing: 1px;
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: 30px auto;
    padding: 20px;
}

/* INPUT Y BOTONES */
input[type="number"] {
    padding: 12px;
    width: 120px;
    font-size: 16px;
    border: 2px solid #0288d1;
    border-radius: 8px;
    margin-right: 10px;
    transition: 0.3s;
}
input[type="number"]:focus {
    outline: none;
    border-color: #00acc1;
    box-shadow: 0 0 5px rgba(0,172,193,0.5);
}

button {
    background: #0288d1;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
button:hover {
    background: #00acc1;
    transform: translateY(-2px);
    box-shadow: 0 6px 10px rgba(0,0,0,0.15);
}

/* HABILIDADES */
.habilidades-list {
    margin-top: 20px;
}
.habilidades-list div {
    margin: 8px 0;
    font-weight: 500;
}

/* RESULTADOS */
#resultados {
    margin-top: 25px;
}

/* CARD MODERNO */
.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    margin: 15px 0;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}
.card img {
    width: 150px;
    border-radius: 10px;
    margin: 10px 0;
}
.card video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    margin-top: 10px;
}

/* TITULOS */
.card h3 {
    color: #0288d1;
    margin-bottom: 8px;
}

/* ANIMACIONES SUAVES */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
.card {
    animation: fadeIn 0.5s ease forwards;
}
</style>
</head>

<body>

<header>Evaluación del Paciente</header>

<div class="container">
    <div>
        <input type="number" id="edad" placeholder="Edad">
        <button onclick="evaluar()">Evaluar</button>
    </div>

    <div class="habilidades-list" id="habilidades"></div>

    <button onclick="recomendar()">Recomendar ejercicios</button>

    <div id="resultados"></div>
</div>

<script>
// HABILIDADES POR EDAD
function obtenerHabilidades(edad){
    if(edad >= 12){
        return ["desarrollar habilidades sociales","tomar decisiones","planificar el futuro"];
    } else if(edad >= 10){
        return ["escribir","resolver problemas matematicos"];
    } else if(edad >= 5){
        return ["saltar","dibujar","hablar"];
    } else if(edad >= 2){
        return ["caminar","decir palabras sencillas"];
    } else {
        return ["girar la cabeza","sonreir","llorar"];
    }
}

// EJERCICIOS + IMAGEN + VIDEO
const ejercicios = {
    "caminar": {texto: "Caminar con apoyo", img: "caminar.png", video: "caminar.mp4"},
    "hablar": {texto: "Practicar palabras", img: "hablar.png", video: "hablar.mp4"},
    "saltar": {texto: "Saltos en colchoneta", img: "saltar.png", video: "saltar.mp4"},
    "dibujar": {texto: "Dibujar con colores", img: "dibujar.png", video: "dibujar.mp4"},
    "escribir": {texto: "Practicar escritura", img: "escribir.png", video: "escribir.mp4"},
    "resolver problemas matematicos": {texto: "Ejercicios de matemáticas simples", img: "matematicas.png", video: "matematicas.mp4"},
    "desarrollar habilidades sociales": {texto: "Juegos grupales y comunicación", img: "social.png", video: "social.mp4"},
    "tomar decisiones": {texto: "Actividades de elección y consecuencias", img: "decidir.png", video: "decidir.mp4"},
    "planificar el futuro": {texto: "Pequeños proyectos y metas", img: "plan.png", video: "plan.mp4"},
    "decir palabras sencillas": {texto: "Repetir palabras y canciones", img: "palabras.png", video: "palabras.mp4"},
    "girar la cabeza": {texto: "Ejercicios de seguimiento visual", img: "cabeza.png", video: "cabeza.mp4"},
    "sonreir": {texto: "Juegos de expresión facial", img: "sonreir.png", video: "sonreir.mp4"},
    "llorar": {texto: "Reconocer emociones", img: "llorar.png", video: "llorar.mp4"}
};

let habilidadesActuales = [];

// MOSTRAR HABILIDADES
function evaluar(){
    let edad = document.getElementById("edad").value;
    let contenedor = document.getElementById("habilidades");
    contenedor.innerHTML = "";
    habilidadesActuales = obtenerHabilidades(edad);

    habilidadesActuales.forEach(h => {
        contenedor.innerHTML += `
            <div>
                <input type="checkbox" value="${h}"> ${h}
            </div>
        `;
    });
}

// RECOMENDACIONES
function recomendar(){
    let seleccionados = document.querySelectorAll("input[type=checkbox]:checked");
    let resultados = document.getElementById("resultados");
    resultados.innerHTML = "";

    seleccionados.forEach(el => {
        let h = el.value;
        let info = ejercicios[h] || {texto: "Actividad sugerida: " + h, img: "default.png", video: "default.mp4"};

        resultados.innerHTML += `
            <div class="card">
                <h3>${h}</h3>
                <p>${info.texto}</p>
                <img src="${info.img}" alt="${h}">
                <video controls>
                    <source src="${info.video}" type="video/mp4">
                </video>
            </div>
        `;
    });
}
</script>

</body>
</html>
