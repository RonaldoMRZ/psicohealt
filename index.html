<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación del Paciente</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #fff3e0);
    color: #333;
}

/* HEADER */
header {
    background: #0288d1;
    color: white;
    text-align: center;
    padding: 25px 0;
    font-size: 28px;
    font-weight: 700;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    letter-spacing: 1px;
    position: relative; /* IMPORTANTE */
}

/* BOTÓN HISTORIAL */
.btn-historial {
    position: absolute;
    top: 20px;
    right: 20px;
    background: white;
    color: #0288d1;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
.btn-historial:hover {
    background: #e1f5fe;
    transform: scale(1.05);
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: 30px auto;
    padding: 20px;
}

/* INPUT Y BOTONES */
input[type="number"] {
    padding: 12px;
    width: 120px;
    font-size: 16px;
    border: 2px solid #0288d1;
    border-radius: 8px;
    margin-right: 10px;
}

button {
    background: #0288d1;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #00acc1;
    transform: translateY(-2px);
}

/* HABILIDADES */
.habilidades-list {
    margin-top: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    margin: 15px 0;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    text-align: center;
    animation: fadeIn 0.5s ease;
}

.card img {
    width: 150px;
    border-radius: 10px;
    margin: 10px 0;
}

.card video {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
}

/* ANIMACIÓN */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
    Evaluación del Paciente
    <button class="btn-historial" onclick="window.location.href='historial.html'">
        📋 Historial
    </button>
</header>

<div class="container">
    <input type="number" id="edad" placeholder="Edad">
    <button onclick="evaluar()">Evaluar</button>

    <h2>¿Qué habilidades carece el paciente?</h2>
    <div class="habilidades-list" id="habilidades"></div>
    
    <button onclick="recomendar()">Recomendar ejercicios</button>

    <div id="resultados"></div>
</div>

<script>
// HABILIDADES
function obtenerHabilidades(edad){
    if(edad >= 12){
        return ["desarrollar habilidades sociales","tomar decisiones","planificar el futuro"];
    } else if(edad >= 10){
        return ["escribir","resolver problemas matematicos"];
    } else if(edad >= 5){
        return ["saltar","dibujar","hablar"];
    } else if(edad >= 2){
        return ["caminar","decir palabras sencillas"];
    } else {
        return ["girar la cabeza","sonreir","llorar"];
    }
}

// EJERCICIOS
const ejercicios = {
    "caminar": {texto: "Caminar con apoyo", img: "caminar.png", video: "caminar.mp4"},
    "hablar": {texto: "Practicar palabras", img: "hablar.png", video: "hablar.mp4"},
    "saltar": {texto: "Saltos en colchoneta", img: "saltar.png", video: "saltar.mp4"},
    "dibujar": {texto: "Dibujar con colores", img: "dibujar.png", video: "dibujar.mp4"}
};

function evaluar(){
    let edad = document.getElementById("edad").value;
    let contenedor = document.getElementById("habilidades");
    contenedor.innerHTML = "";

    let habilidades = obtenerHabilidades(edad);

    habilidades.forEach(h => {
        contenedor.innerHTML += `
            <div>
                <input type="checkbox" value="${h}"> ${h}
            </div>
        `;
    });
}

function recomendar(){
    let seleccionados = document.querySelectorAll("input:checked");
    let resultados = document.getElementById("resultados");
    resultados.innerHTML = "";

    seleccionados.forEach(el => {
        let h = el.value;
        let info = ejercicios[h] || {
            texto: "Actividad sugerida: " + h,
            img: "default.png",
            video: "default.mp4"
        };

        resultados.innerHTML += `
            <div class="card">
                <h3>${h}</h3>
                <p>${info.texto}</p>
                <img src="${info.img}">
                <video controls>
                    <source src="${info.video}" type="video/mp4">
                </video>
            </div>
        `;
    });
}
</script>

</body>
</html>
