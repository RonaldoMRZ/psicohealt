<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Clínico</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNmNtKELNgO40l4wJKq6iNjwlEDPLQ1D8",
  authDomain: "psicohealt-3cbbd.firebaseapp.com",
  projectId: "psicohealt-3cbbd",
  storageBucket: "psicohealt-3cbbd.firebasestorage.app",
  messagingSenderId: "199080682822",
  appId: "1:199080682822:web:6e4443e3cc16ccceb5f147",
  measurementId: "G-EFDSDFET5F"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body {font-family: Arial; background:#f0f4f8; margin:0;}
header {background:#0288d1;color:white;padding:20px;text-align:center; font-size:22px; font-weight:bold;}
.container {padding:20px;text-align:center;}
input, textarea {
    padding:10px; margin:5px; width:250px;
    border-radius:8px; border:1px solid #ccc;
}
button {
    padding:10px 15px; background:#0288d1;
    color:white; border:none; border-radius:8px;
    cursor:pointer; margin:5px;
}
button:hover {background:#00acc1;}
.card {
    background:white; margin:15px auto; padding:15px;
    border-radius:10px; width:350px; text-align:left;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
.historial {background:#ffe0e0;padding:10px;margin-top:10px;border-radius:6px;}
.btn-eliminar {background:red;color:white;}
#app {display:none;}
#login input, #app input, #app textarea {width:80%; max-width:300px;}
</style>
</head>

<body>

<header>🏥 Sistema de Pacientes</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h2>Login / Registro</h2>
<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>
</div>

<!-- APP -->
<div id="app">

<h2>Agregar paciente</h2>
<input id="nombre" placeholder="Nombre">
<input id="edad" type="number" placeholder="Edad"><br>
<button onclick="crearPaciente()">Guardar paciente</button>

<h2>Buscar paciente</h2>
<input id="busqueda" placeholder="Buscar por nombre o ID" onkeyup="buscarPaciente()">

<div id="formulario"></div>
<div id="lista"></div>

<br>
<button onclick="logout()">Cerrar sesión</button>

</div>

</div>

<script>
let pacientes = [];
let pacienteIndex = null;

// LOGIN & REGISTRO
function register(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    auth.createUserWithEmailAndPassword(email, password)
        .then(()=> alert("Usuario creado correctamente"))
        .catch(e=> alert(e.message));
}

function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(email, password)
        .catch(e=> alert(e.message));
}

function logout(){ auth.signOut(); }

// SESIÓN
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        cargarDatos();
    } else {
        document.getElementById("login").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

// GENERAR ID
function generarID(){ return "PAC-"+Math.floor(Math.random()*1000000); }

// GUARDAR Y CARGAR DATOS
function guardarDatos(){
    let user = auth.currentUser;
    db.collection("pacientes").doc(user.uid).set({datos: pacientes});
}

function cargarDatos(){
    let user = auth.currentUser;
    db.collection("pacientes").doc(user.uid).get()
    .then(doc=>{
        if(doc.exists) pacientes = doc.data().datos;
        mostrarPacientes();
    });
}

// CREAR PACIENTE
function crearPaciente(){
    let nombreV = document.getElementById("nombre").value;
    let edadV = document.getElementById("edad").value;
    if(!nombreV || !edadV) return alert("Nombre y edad son obligatorios");

    pacientes.push({
        id: generarID(),
        nombre: nombreV,
        edad: edadV,
        historial:[]
    });
    guardarDatos();
    mostrarPacientes();
    document.getElementById("nombre").value="";
    document.getElementById("edad").value="";
}

// NUEVO REGISTRO
function nuevoRegistro(i){
    pacienteIndex = i;
    document.getElementById("formulario").innerHTML=`
        <input id="noPuede" placeholder="No puede hacer">
        <textarea id="obs" placeholder="Observaciones"></textarea><br>
        <button onclick="guardarRegistro()">Guardar registro</button>
    `;
}

// GUARDAR REGISTRO
function guardarRegistro(){
    let noPuedeV = document.getElementById("noPuede").value;
    let obsV = document.getElementById("obs").value;
    if(!noPuedeV) return alert("Debes indicar lo que el paciente no puede hacer");

    pacientes[pacienteIndex].historial.push({
        fecha: new Date().toLocaleDateString(),
        noPuede: noPuedeV,
        obs: obsV
    });
    guardarDatos();
    document.getElementById("formulario").innerHTML="";
    mostrarPacientes();
}

// ELIMINAR PACIENTE
function eliminarPaciente(i){
    if(confirm("¿Eliminar este paciente?")) {
        pacientes.splice(i,1);
        guardarDatos();
        mostrarPacientes();
    }
}

// ELIMINAR REGISTRO
function eliminarRegistro(p,r){
    if(confirm("¿Eliminar este registro?")){
        pacientes[p].historial.splice(r,1);
        guardarDatos();
        mostrarPacientes();
    }
}

// BUSCAR PACIENTE
function buscarPaciente(){
    let filtro = document.getElementById("busqueda").value.toLowerCase();
    mostrarPacientes(filtro);
}

// MOSTRAR PACIENTES
function mostrarPacientes(filtro=""){
    let lista = document.getElementById("lista");
    lista.innerHTML="";

    pacientes.forEach((p,i)=>{
        if(p.nombre.toLowerCase().includes(filtro) || p.id.toLowerCase().includes(filtro)){
            let hist="";
            p.historial.forEach((h,j)=>{
                hist+=`
                <div class="historial">
                    <strong>${h.fecha}</strong><br>
                    ❌ ${h.noPuede}<br>
                    📝 ${h.obs}<br>
                    <button class="btn-eliminar" onclick="eliminarRegistro(${i},${j})">Eliminar</button>
                </div>`;
            });

            lista.innerHTML+=`
            <div class="card">
                <h3>${p.nombre}</h3>
                ID: ${p.id}<br>
                Edad: ${p.edad}<br>
                <button onclick="nuevoRegistro(${i})">➕ Nuevo registro</button>
                <button class="btn-eliminar" onclick="eliminarPaciente(${i})">🗑️ Eliminar paciente</button>
                ${hist}
            </div>`;
        }
    });
}
</script>

</body>
</html>
