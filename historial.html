const db = firebase.firestore();
</script>

<style>
body {font-family: Arial; margin:0; background:#f0f4f8;}
header {background:#0288d1;color:white;padding:20px;text-align:center;font-size:24px; display:flex; justify-content: space-between; align-items:center;}
header button {background:red;color:white;border:none;border-radius:8px;padding:5px 10px;cursor:pointer;}
.container {padding:20px;}
input, textarea {padding:10px;margin:5px;width:250px;border-radius:8px;border:1px solid #ccc;}
button {padding:10px 15px;margin:5px;background:#0288d1;color:white;border:none;border-radius:8px;cursor:pointer;}
.card {background:white;margin:15px auto;padding:15px;border-radius:10px;width:320px;text-align:left;}
.historial {background:#ffe0e0;padding:10px;margin-top:10px;}
.btn-eliminar {background:red; color:white;}
.nav-buttons {margin-bottom:15px;}
</style>
</head>

<body>
<header>
    <button onclick="window.location.href='index.html'">🏠 Home</button>
    Historial de Pacientes
    <button onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">
    <h2>Agregar paciente</h2>
    <input id="nombre" placeholder="Nombre">
    <input id="edad" type="number" placeholder="Edad">
    <button onclick="crearPaciente()">Guardar</button>

    <h2>Buscar paciente</h2>
    <input id="busqueda" placeholder="Buscar por nombre o ID" onkeyup="buscarPaciente()">

    <div id="formulario"></div>
    <div id="lista"></div>
</div>

<script>
let pacientes = [];
let pacienteIndex = null;

// Logout
function logout(){ auth.signOut(); }

// Manejo sesión
auth.onAuthStateChanged(user=>{
    if(!user){ window.location.href="index.html"; } else { cargarDatos(); }
});

// Generar ID
function generarID(){ return "PAC-"+Math.floor(Math.random()*1000000); }

// Guardar y cargar datos
function guardarDatos(){
    const user = auth.currentUser;
    if(!user) return;
    db.collection("usuarios").doc(user.uid).set({ pacientes });
}
function cargarDatos(){
    const user = auth.currentUser;
    if(!user) return;
    db.collection("usuarios").doc(user.uid).get()
    .then(doc=>{
        pacientes = doc.exists ? doc.data().pacientes||[] : [];
        mostrarPacientes();
    });
}

// Crear paciente
function crearPaciente(){
    const nombreVal=document.getElementById("nombre").value;
    const edadVal=document.getElementById("edad").value;
    if(!nombreVal||!edadVal) return;
    pacientes.push({id:generarID(),nombre:nombreVal,edad:edadVal,historial:[]});
    document.getElementById("nombre").value="";
    document.getElementById("edad").value="";
    guardarDatos(); mostrarPacientes();
}

// Nuevo registro
function nuevoRegistro(i){
    pacienteIndex=i;
    document.getElementById("formulario").innerHTML = `
        <input id="noPuede" placeholder="No puede hacer">
        <textarea id="obs" placeholder="Observaciones"></textarea><br>
        <button onclick="guardarRegistro()">Guardar</button>
    `;
}

// Guardar registro
function guardarRegistro(){
    const noPuedeVal=document.getElementById("noPuede").value;
    const obsVal=document.getElementById("obs").value;
    if(!noPuedeVal && !obsVal) return;
    pacientes[pacienteIndex].historial.push({fecha:new Date().toLocaleDateString(),noPuede:noPuedeVal,obs:obsVal});
    guardarDatos(); document.getElementById("formulario").innerHTML=""; mostrarPacientes();
}

// Eliminar
function eliminarPaciente(i){ if(!confirm("Eliminar paciente?")) return; pacientes.splice(i,1); guardarDatos(); mostrarPacientes(); }
function eliminarRegistro(p,r){ if(!confirm("Eliminar registro?")) return; pacientes[p].historial.splice(r,1); guardarDatos(); mostrarPacientes(); }

// Buscar y mostrar
function buscarPaciente(){ mostrarPacientes(document.getElementById("busqueda").value.toLowerCase()); }
function mostrarPacientes(filtro=""){
    const lista=document.getElementById("lista"); lista.innerHTML="";
    pacientes.forEach((p,i)=>{
        if(p.nombre.toLowerCase().includes(filtro)||p.id.toLowerCase().includes(filtro)){
            let historialHTML="";
            p.historial.forEach((h,j)=>{
                historialHTML+=`<div class="historial">
                <b>${h.fecha}</b><br>❌ ${h.noPuede}<br>📝 ${h.obs}<br>
                <button class="btn-eliminar" onclick="eliminarRegistro(${i},${j})">Eliminar</button>
                </div>`;
            });
            lista.innerHTML+=`<div class="card">
                <h3>${p.nombre}</h3>ID: ${p.id}<br>Edad: ${p.edad}<br>
                <button onclick="nuevoRegistro(${i})">➕ Registro</button>
                <button class="btn-eliminar" onclick="eliminarPaciente(${i})">🗑️</button>
                ${historialHTML}
            </div>`;
        }
    });
}
</script>
</body>
</html>
