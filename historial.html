<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Pacientes</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {font-family: Arial; background:#f0f4f8; margin:0;}
header h2 {margin:0; text-align:center;}
.container {padding:20px; text-align:center;}
input, textarea {padding:10px; margin:5px; width:250px; border-radius:8px; border:1px solid #ccc;}
button {padding:10px 15px; background:#0288d1; color:white; border:none; border-radius:8px; cursor:pointer; margin:5px;}
button:hover {background:#0277bd;}
.card {background:white; margin:15px auto; padding:15px; border-radius:10px; width:350px; text-align:left;}
.historial {background:#ffe0e0; padding:10px; margin-top:10px; border-radius:8px;}
.btn-eliminar {background:red; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer;}
#formulario input, #formulario textarea {width:100%; box-sizing:border-box;}
</style>
</head>

<body>

<!-- HEADER -->
<header style="display:flex; justify-content:space-between; align-items:center; background:#0288d1; color:white; padding:15px 20px;">
  <button onclick="window.location.href='index.html'" style="background:#ffca28; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">🏠 Inicio</button>
  <h2>Sistema de Pacientes</h2>
  <button onclick="logout()" style="background:red; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">Cerrar sesión</button>
</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h2>Agregar paciente</h2>
<input id="nombre" placeholder="Nombre">
<input id="edad" type="number" placeholder="Edad"><br>
<button onclick="crearPaciente()">Guardar</button>

<h2>Buscar paciente</h2>
<input id="busqueda" placeholder="Buscar por nombre o ID" onkeyup="buscarPaciente()">

<div id="formulario"></div>
<div id="lista"></div>

</div>
</div>

<script>
// 🔥 CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBNmNtKELNgO40l4wJKq6iNjwlEDPLQ1D8",
  authDomain: "psicohealt-3cbbd.firebaseapp.com",
  projectId: "psicohealt-3cbbd",
  storageBucket: "psicohealt-3cbbd.appspot.com",
  messagingSenderId: "199080682822",
  appId: "1:199080682822:web:6e4443e3cc16ccceb5f147"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let pacientes = [];
let pacienteIndex = null;

// 🔐 Registro
function register(){
    auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(()=>alert("Usuario creado correctamente"))
    .catch(e=>alert(e.message));
}

// 🔐 Login
function login(){
    auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e=>alert(e.message));
}

// 🔒 Logout
function logout(){
    auth.signOut();
}

// 🔄 Manejar sesión
auth.onAuthStateChanged(user=>{
    if(user){
        login.style.display="none";
        app.style.display="block";
        cargarDatos();
    } else {
        login.style.display="block";
        app.style.display="none";
    }
});

// 🆔 Generar ID
function generarID(){
    return "PAC-"+Math.floor(Math.random()*1000000);
}

// 💾 Guardar datos en Firestore
function guardarDatos(){
    let user = auth.currentUser;
    if(!user) return;
    db.collection("usuarios").doc(user.uid).set({pacientes: pacientes});
}

// 📥 Cargar datos
function cargarDatos(){
    let user = auth.currentUser;
    if(!user) return;
    db.collection("usuarios").doc(user.uid).get()
    .then(doc=>{
        if(doc.exists){
            pacientes = doc.data().pacientes || [];
        }
        mostrarPacientes();
    });
}

// ➕ Crear paciente
function crearPaciente(){
    if(!nombre.value || !edad.value) return;
    pacientes.push({id: generarID(), nombre: nombre.value, edad: edad.value, historial: []});
    nombre.value=""; edad.value="";
    guardarDatos();
    mostrarPacientes();
}

// 📝 Nuevo registro
function nuevoRegistro(i){
    pacienteIndex = i;
    formulario.innerHTML = `
        <input id="noPuede" placeholder="No puede hacer">
        <textarea id="obs" placeholder="Observaciones"></textarea><br>
        <button onclick="guardarRegistro()">Guardar</button>
    `;
}

// 💾 Guardar registro
function guardarRegistro(){
    if(!noPuede.value && !obs.value) return;
    pacientes[pacienteIndex].historial.push({
        fecha: new Date().toLocaleDateString(),
        noPuede: noPuede.value,
        obs: obs.value
    });
    guardarDatos();
    formulario.innerHTML="";
    mostrarPacientes();
}

// 🗑️ Eliminar paciente o registro
function eliminarPaciente(i){
    if(!confirm("¿Eliminar paciente?")) return;
    pacientes.splice(i,1);
    guardarDatos();
    mostrarPacientes();
}

function eliminarRegistro(p,r){
    if(!confirm("¿Eliminar registro?")) return;
    pacientes[p].historial.splice(r,1);
    guardarDatos();
    mostrarPacientes();
}

// 🔍 Buscar paciente
function buscarPaciente(){
    let t = busqueda.value.toLowerCase();
    mostrarPacientes(t);
}

// 📋 Mostrar pacientes
function mostrarPacientes(filtro=""){
    lista.innerHTML="";
    pacientes.forEach((p,i)=>{
        if(p.nombre.toLowerCase().includes(filtro) || p.id.toLowerCase().includes(filtro)){
            let hist="";
            p.historial.forEach((h,j)=>{
                hist+=`
                <div class="historial">
                    <b>${h.fecha}</b><br>
                    ❌ ${h.noPuede}<br>
                    📝 ${h.obs}<br>
                    <button class="btn-eliminar" onclick="eliminarRegistro(${i},${j})">Eliminar</button>
                </div>`;
            });
            lista.innerHTML+=`
            <div class="card">
                <h3>${p.nombre}</h3>
                ID: ${p.id}<br>
                Edad: ${p.edad}<br>
                <button onclick="nuevoRegistro(${i})">➕ Registro</button>
                <button class="btn-eliminar" onclick="eliminarPaciente(${i})">🗑️</button>
                ${hist}
            </div>`;
        }
    });
}
</script>

</body>
</html>
