<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial - Sistema Clínico</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNmNtKELNgO40l4wJKq6iNjwlEDPLQ1D8",
  authDomain: "psicohealt-3cbbd.firebaseapp.com",
  projectId: "psicohealt-3cbbd"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body {font-family: Arial; margin:0; background:#f0f4f8;}

header {
    background:#0288d1;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header button {
    border:none;
    border-radius:8px;
    padding:6px 12px;
    cursor:pointer;
}

.btn-home {background:white; color:#0288d1;}
.btn-logout {background:red; color:white;}

.container {padding:20px; text-align:center;}

input, textarea {
    padding:10px;
    margin:5px;
    width:250px;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    padding:10px 15px;
    margin:5px;
    background:#0288d1;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.card {
    background:white;
    margin:15px auto;
    padding:15px;
    border-radius:10px;
    width:340px;
    text-align:left;
}

.historial {
    background:#ffe0e0;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.btn-eliminar {background:red;}

.form-registro {
    background:#e3f2fd;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
    <button class="btn-home" onclick="window.location.href='index.html'">🏠 Home</button>
    <h3>Historial de Pacientes</h3>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">

<h3>Agregar paciente</h3>
<input id="nombre" placeholder="Nombre">
<input id="edad" type="number" placeholder="Edad">
<button onclick="crearPaciente()">Guardar</button>

<h3>Buscar</h3>
<input id="busqueda" onkeyup="buscarPaciente()" placeholder="Buscar por nombre o ID">

<div id="lista"></div>

</div>

<script>

let pacientes = [];

// 🔐 sesión
auth.onAuthStateChanged(user=>{
    if(!user){
        alert("Inicia sesión primero");
        window.location.href="index.html";
    } else {
        cargarDatos();
    }
});

function logout(){ auth.signOut(); }

// 🆔 ID
function generarID(){
    return "PAC-"+Date.now();
}

// 💾 GUARDAR (FIX PRO)
async function guardarDatos(){
    const user = auth.currentUser;
    if(!user) return;

    try {
        await db.collection("usuarios")
        .doc(user.uid)
        .set({ pacientes: pacientes }, { merge:true });

        console.log("✅ Guardado correcto");
    } catch(e){
        console.error(e);
        alert("Error al guardar");
    }
}

// 📥 CARGAR
async function cargarDatos(){
    const user = auth.currentUser;
    if(!user) return;

    try {
        const doc = await db.collection("usuarios").doc(user.uid).get();

        if(doc.exists){
            pacientes = doc.data().pacientes || [];
        } else {
            pacientes = [];
        }

        mostrarPacientes();
    } catch(e){
        console.error(e);
        alert("Error al cargar datos");
    }
}

// ➕ CREAR PACIENTE
async function crearPaciente(){
    let nombre = document.getElementById("nombre").value;
    let edad = document.getElementById("edad").value;

    if(!nombre || !edad) return;

    pacientes.push({
        id: generarID(),
        nombre,
        edad,
        historial:[]
    });

    document.getElementById("nombre").value="";
    document.getElementById("edad").value="";

    await guardarDatos();
    mostrarPacientes();
}

// 📝 FORMULARIO
function nuevoRegistro(i){
    document.getElementById("form-"+i).innerHTML = `
    <div class="form-registro">
        <input id="noPuede${i}" placeholder="No puede hacer"><br>
        <textarea id="obs${i}" placeholder="Observaciones"></textarea><br>
        <button onclick="guardarRegistro(${i})">Guardar</button>
    </div>
    `;
}

// 💾 GUARDAR REGISTRO
async function guardarRegistro(i){
    let noPuede = document.getElementById("noPuede"+i).value;
    let obs = document.getElementById("obs"+i).value;

    if(!noPuede && !obs) return;

    pacientes[i].historial.push({
        fecha: new Date().toLocaleDateString(),
        noPuede,
        obs
    });

    await guardarDatos();
    mostrarPacientes();
}

// 🗑️ ELIMINAR
async function eliminarPaciente(i){
    if(!confirm("Eliminar paciente?")) return;
    pacientes.splice(i,1);
    await guardarDatos();
    mostrarPacientes();
}

async function eliminarRegistro(p,r){
    if(!confirm("Eliminar registro?")) return;
    pacientes[p].historial.splice(r,1);
    await guardarDatos();
    mostrarPacientes();
}

// 🔍 BUSCAR
function buscarPaciente(){
    let t = document.getElementById("busqueda").value.toLowerCase();
    mostrarPacientes(t);
}

// 📋 MOSTRAR
function mostrarPacientes(filtro=""){
    let lista = document.getElementById("lista");
    lista.innerHTML="";

    pacientes.forEach((p,i)=>{
        if(p.nombre.toLowerCase().includes(filtro) || p.id.toLowerCase().includes(filtro)){

            let hist = "";
            p.historial.forEach((h,j)=>{
                hist += `
                <div class="historial">
                    <b>${h.fecha}</b><br>
                    ❌ ${h.noPuede}<br>
                    📝 ${h.obs}<br>
                    <button class="btn-eliminar" onclick="eliminarRegistro(${i},${j})">Eliminar</button>
                </div>`;
            });

            lista.innerHTML += `
            <div class="card">
                <h3>${p.nombre}</h3>
                ID: ${p.id}<br>
                Edad: ${p.edad}<br>

                <button onclick="nuevoRegistro(${i})">➕ Nuevo Registro</button>
                <button class="btn-eliminar" onclick="eliminarPaciente(${i})">🗑️</button>

                <div id="form-${i}"></div>

                ${hist}
            </div>
            `;
        }
    });
}

</script>

</body>
</html>
