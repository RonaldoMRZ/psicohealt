<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pacientes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-delete {
            background-color: #e74c3c;
            padding: 5px 10px;
        }
        .btn-delete:hover {
            background-color: #c0392b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #ecf0f1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 Sistema de Registro de Pacientes</h2>
    
    <div class="form-group">
        <input type="text" id="nombrePaciente" placeholder="Nombre completo del paciente">
        <input type="text" id="motivoConsulta" placeholder="Motivo de la consulta">
        <button onclick="agregarPaciente()">Agregar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Motivo</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaPacientes">
            </tbody>
    </table>
</div>

<script>
    // Arreglo para guardar los registros
    let pacientes = [
        { id: 1, nombre: "Juan Pérez", motivo: "Dolor de cabeza" },
        { id: 2, nombre: "María López", motivo: "Chequeo general" }
    ];

    // Función para mostrar los pacientes en la tabla
    function renderizarTabla() {
        const tbody = document.getElementById("tablaPacientes");
        tbody.innerHTML = ""; // Limpiar tabla antes de actualizar

        pacientes.forEach((paciente, index) => {
            const fila = document.createElement("tr");
            
            fila.innerHTML = `
                <td>${paciente.id}</td>
                <td>${paciente.nombre}</td>
                <td>${paciente.motivo}</td>
                <td>
                    <button class="btn-delete" onclick="borrarPaciente(${index})">Eliminar</button>
                </td>
            `;
            tbody.appendChild(fila);
        });
    }

    // Función para agregar un nuevo paciente
    function agregarPaciente() {
        const inputNombre = document.getElementById("nombrePaciente");
        const inputMotivo = document.getElementById("motivoConsulta");

        if (inputNombre.value.trim() === "" || inputMotivo.value.trim() === "") {
            alert("Por favor, llena todos los campos.");
            return;
        }

        const nuevoPaciente = {
            id: pacientes.length > 0 ? pacientes[pacientes.length - 1].id + 1 : 1,
            nombre: inputNombre.value,
            motivo: inputMotivo.value
        };

        pacientes.push(nuevoPaciente);
        inputNombre.value = "";
        inputMotivo.value = "";
        
        renderizarTabla();
    }

    // Función para borrar con mensaje de confirmación
    function borrarPaciente(index) {
        // Aquí está la magia de la confirmación
        const confirmacion = confirm(`¿Estás completamente seguro de que deseas eliminar el registro de ${pacientes[index].nombre}?`);
        
        if (confirmacion) {
            pacientes.splice(index, 1); // Elimina 1 elemento en la posición "index"
            renderizarTabla(); // Actualiza la vista
        }
    }

    // Mostrar los datos iniciales al cargar la página
    renderizarTabla();
</script>

</body>
</html>
