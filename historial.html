<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Pacientes</title>

<style>
body {
    font-family: Arial;
    background: #f0f4f8;
    margin: 0;
}

/* HEADER */
header {
    background: #0288d1;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    position: relative;
}

.volver {
    position: absolute;
    left: 20px;
    top: 20px;
    background: white;
    color: #0288d1;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}

/* CONTENEDOR */
.container {
    padding: 20px;
    text-align: center;
}

/* INPUTS */
input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 250px;
}

/* BOTONES */
button {
    padding: 10px 15px;
    background: #0288d1;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px;
    transition: 0.3s;
}
button:hover {
    background: #00acc1;
    transform: scale(1.05);
}

/* CARD */
.card {
    background: white;
    margin: 15px auto;
    padding: 15px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: left;
}

/* HISTORIAL */
.historial {
    background: #e3f2fd;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
}

/* FORMULARIO */
.form-box {
    background: #fff;
    margin: 20px auto;
    padding: 15px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
    <button class="volver" onclick="volver()">⬅</button>
    Historial de Pacientes
</header>

<div class="container">

    <h2>Agregar paciente</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="number" id="edad" placeholder="Edad">
    <br>
    <button onclick="guardarPaciente()">Guardar paciente</button>

    <h2>Pacientes</h2>

    <!-- FORMULARIO DINÁMICO -->
    <div id="formRegistro"></div>

    <!-- LISTA -->
    <div id="lista"></div>

</div>

<script>

let pacientes = JSON.parse(localStorage.getItem("pacientes")) || [];
let pacienteActivo = null;

// CREAR PACIENTE
function guardarPaciente(){
    let nombre = document.getElementById("nombre").value;
    let edad = document.getElementById("edad").value;

    if(!nombre || !edad){
        alert("Completa todos los campos");
        return;
    }

    pacientes.push({
        nombre,
        edad,
        historial: []
    });

    localStorage.setItem("pacientes", JSON.stringify(pacientes));
    mostrarPacientes();
}

// MOSTRAR FORMULARIO
function mostrarFormulario(index){
    pacienteActivo = index;

    document.getElementById("formRegistro").innerHTML = `
        <div class="form-box">
            <h3>Nuevo registro para ${pacientes[index].nombre}</h3>

            <input type="text" id="puede" placeholder="Qué puede hacer (ej: caminar, hablar)">
            <br>
            <input type="text" id="noPuede" placeholder="Qué NO puede hacer">
            <br><br>

            <button onclick="guardarRegistro()">Guardar</button>
        </div>
    `;
}

// GUARDAR REGISTRO
function guardarRegistro(){
    let puede = document.getElementById("puede").value;
    let noPuede = document.getElementById("noPuede").value;

    let registro = {
        fecha: new Date().toLocaleDateString(),
        puede: puede ? puede.split(",") : [],
        noPuede: noPuede ? noPuede.split(",") : []
    };

    pacientes[pacienteActivo].historial.push(registro);

    localStorage.setItem("pacientes", JSON.stringify(pacientes));

    document.getElementById("formRegistro").innerHTML = "";
    mostrarPacientes();
}

// MOSTRAR PACIENTES
function mostrarPacientes(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    pacientes.forEach((p, i) => {
        let historialHTML = "";

        p.historial.forEach(h => {
            historialHTML += `
                <div class="historial">
                    <b>📅 ${h.fecha}</b><br>
                    ✅ Puede: ${h.puede.join(", ")}<br>
                    ❌ No puede: ${h.noPuede.join(", ")}
                </div>
            `;
        });

        lista.innerHTML += `
            <div class="card">
                <h3>${p.nombre}</h3>
                <p>Edad: ${p.edad}</p>

                <button onclick="mostrarFormulario(${i})">
                    ➕ Nuevo registro
                </button>

                ${historialHTML}
            </div>
        `;
    });
}

// VOLVER
function volver(){
    window.location.href = "index.html";
}

// INICIAR
mostrarPacientes();

</script>

</body>
</html>
