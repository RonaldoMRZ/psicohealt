<style>
body {font-family: Arial; background:#f0f4f8; margin:0;}
header {background:#0288d1;color:white;padding:20px;text-align:center;}
.container {padding:20px;text-align:center;}
input, textarea {
    padding:10px; margin:5px; width:250px;
    border-radius:8px; border:1px solid #ccc;
}
button {
    padding:10px 15px; background:#0288d1;
    color:white; border:none; border-radius:8px;
    cursor:pointer; margin:5px;
}
.card {
    background:white; margin:15px auto; padding:15px;
    border-radius:10px; width:320px;
}
.historial {background:#ffe0e0;padding:10px;margin-top:10px;}
.btn-eliminar {background:red;}
</style>
</head>

<body>

<header>🏥 Sistema de Pacientes</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h2>Agregar paciente</h2>
<input id="nombre" placeholder="Nombre">
<input id="edad" type="number" placeholder="Edad"><br>
<button onclick="crearPaciente()">Guardar</button>

<h2>Buscar</h2>
<input id="busqueda" placeholder="Buscar..." onkeyup="buscarPaciente()">

<div id="formulario"></div>
<div id="lista"></div>

<button onclick="logout()">Cerrar sesión</button>

</div>

</div>

<script>

// 🔥 CONFIGURA AQUÍ
const firebaseConfig = {
  apiKey: "AQUI_TU_API_KEY",
  authDomain: "AQUI_TU_DOMINIO",
  projectId: "AQUI_TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let pacientes = [];
let pacienteIndex = null;

// 🔐 LOGIN
function register(){
    auth.createUserWithEmailAndPassword(
        email.value, password.value
    ).then(()=>alert("Usuario creado"))
    .catch(e=>alert(e.message));
}

function login(){
    auth.signInWithEmailAndPassword(
        email.value, password.value
    ).catch(e=>alert(e.message));
}

function logout(){
    auth.signOut();
}

// 🔄 SESIÓN
auth.onAuthStateChanged(user=>{
    if(user){
        login.style.display="none";
        app.style.display="block";
        cargarDatos();
    } else {
        login.style.display="block";
        app.style.display="none";
    }
});

// 🆔 ID
function generarID(){
    return "PAC-"+Math.floor(Math.random()*1000000);
}

// 💾 GUARDAR
function guardarDatos(){
    let user = auth.currentUser;
    db.collection("pacientes").doc(user.uid).set({
        datos: pacientes
    });
}

// 📥 CARGAR
function cargarDatos(){
    let user = auth.currentUser;
    db.collection("pacientes").doc(user.uid).get()
    .then(doc=>{
        if(doc.exists){
            pacientes = doc.data().datos;
        }
        mostrarPacientes();
    });
}

// ➕ CREAR
function crearPaciente(){
    if(!nombre.value || !edad.value) return;

    pacientes.push({
        id: generarID(),
        nombre: nombre.value,
        edad: edad.value,
        historial:[]
    });

    guardarDatos();
    mostrarPacientes();
}

// 📝 NUEVO REGISTRO
function nuevoRegistro(i){
    pacienteIndex = i;

    formulario.innerHTML = `
        <input id="noPuede" placeholder="No puede hacer">
        <textarea id="obs" placeholder="Observaciones"></textarea>
        <button onclick="guardarRegistro()">Guardar</button>
    `;
}

// 💾 GUARDAR REGISTRO
function guardarRegistro(){
    pacientes[pacienteIndex].historial.push({
        fecha: new Date().toLocaleDateString(),
        noPuede: noPuede.value,
        obs: obs.value
    });

    guardarDatos();
    formulario.innerHTML="";
    mostrarPacientes();
}

// 🗑️ ELIMINAR
function eliminarPaciente(i){
    pacientes.splice(i,1);
    guardarDatos();
    mostrarPacientes();
}

function eliminarRegistro(p,r){
    pacientes[p].historial.splice(r,1);
    guardarDatos();
    mostrarPacientes();
}

// 🔍 BUSCAR
function buscarPaciente(){
    let t = busqueda.value.toLowerCase();
    mostrarPacientes(t);
}

// 📋 MOSTRAR
function mostrarPacientes(filtro=""){
    lista.innerHTML="";

    pacientes.forEach((p,i)=>{
        if(
            p.nombre.toLowerCase().includes(filtro) ||
            p.id.toLowerCase().includes(filtro)
        ){

            let hist="";
            p.historial.forEach((h,j)=>{
                hist+=`
                <div class="historial">
                    ${h.fecha}<br>
                    ❌ ${h.noPuede}<br>
                    📝 ${h.obs}<br>
                    <button class="btn-eliminar" onclick="eliminarRegistro(${i},${j})">Eliminar</button>
                </div>`;
            });

            lista.innerHTML+=`
            <div class="card">
                <h3>${p.nombre}</h3>
                ID: ${p.id}<br>
                Edad: ${p.edad}<br>

                <button onclick="nuevoRegistro(${i})">➕ Registro</button>
                <button class="btn-eliminar" onclick="eliminarPaciente(${i})">🗑️</button>

                ${hist}
            </div>`;
        }
    });
}

</script>

</body>
</html>
