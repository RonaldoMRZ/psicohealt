<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Pacientes</title>

<style>
body {
    font-family: Arial;
    background: #f0f4f8;
    margin: 0;
}

header {
    background: #0288d1;
    color: white;
    padding: 20px;
    text-align: center;
    position: relative;
}

.volver {
    position: absolute;
    left: 20px;
    top: 20px;
    background: white;
    color: #0288d1;
    border: none;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
}

.container {
    padding: 20px;
    text-align: center;
}

input, textarea {
    padding: 10px;
    margin: 5px;
    width: 250px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

textarea {
    height: 80px;
}

button {
    padding: 10px 15px;
    background: #0288d1;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px;
    transition: 0.2s;
}

button:hover {
    background: #00acc1;
}

/* BOTÓN ELIMINAR */
.btn-eliminar {
    background: #e53935;
}
.btn-eliminar:hover {
    background: #c62828;
}

.card {
    background: white;
    margin: 15px auto;
    padding: 15px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: left;
}

.historial {
    background: #ffe0e0;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

.form-box {
    background: white;
    padding: 15px;
    margin: 15px auto;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
    <button class="volver" onclick="volver()">⬅</button>
    Historial de Pacientes
</header>

<div class="container">

<h2>Agregar paciente</h2>
<input type="text" id="nombre" placeholder="Nombre">
<input type="number" id="edad" placeholder="Edad"><br>
<button onclick="crearPaciente()">Guardar</button>

<h2>Pacientes</h2>

<div id="formulario"></div>
<div id="lista"></div>

</div>

<script>

let pacientes = JSON.parse(localStorage.getItem("pacientes")) || [];
let pacienteIndex = null;

// GENERAR ID
function generarID(){
    return "PAC-" + Math.floor(Math.random()*1000000);
}

// CREAR PACIENTE
function crearPaciente(){
    let nombre = document.getElementById("nombre").value;
    let edad = document.getElementById("edad").value;

    if(nombre === "" || edad === ""){
        alert("Completa los datos");
        return;
    }

    pacientes.push({
        id: generarID(),
        nombre: nombre,
        edad: edad,
        historial: []
    });

    guardarDatos();
    mostrarPacientes();
}

// FORMULARIO REGISTRO
function nuevoRegistro(i){
    pacienteIndex = i;

    document.getElementById("formulario").innerHTML = `
        <div class="form-box">
            <h3>Nuevo registro</h3>

            <input id="noPuede" placeholder="¿Qué no puede hacer?">
            <br>

            <textarea id="obs" placeholder="Observaciones"></textarea>
            <br>

            <button onclick="guardarRegistro()">Guardar</button>
        </div>
    `;
}

// GUARDAR REGISTRO
function guardarRegistro(){
    let noPuede = document.getElementById("noPuede").value;
    let obs = document.getElementById("obs").value;

    if(noPuede === ""){
        alert("Escribe una dificultad");
        return;
    }

    pacientes[pacienteIndex].historial.push({
        fecha: new Date().toLocaleDateString(),
        noPuede: noPuede,
        obs: obs
    });

    guardarDatos();
    document.getElementById("formulario").innerHTML = "";
    mostrarPacientes();
}

// ELIMINAR PACIENTE
function eliminarPaciente(i){
    if(confirm("¿Eliminar paciente?")){
        pacientes.splice(i, 1);
        guardarDatos();
        mostrarPacientes();
    }
}

// ELIMINAR REGISTRO
function eliminarRegistro(pIndex, rIndex){
    if(confirm("¿Eliminar registro?")){
        pacientes[pIndex].historial.splice(rIndex, 1);
        guardarDatos();
        mostrarPacientes();
    }
}

// MOSTRAR PACIENTES
function mostrarPacientes(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    pacientes.forEach((p, i) => {

        let hist = "";

        p.historial.forEach((h, j) => {
            hist += `
                <div class="historial">
                    <b>${h.fecha}</b><br>
                    ❌ ${h.noPuede}<br>
                    📝 ${h.obs}<br>
                    <button class="btn-eliminar" onclick="eliminarRegistro(${i}, ${j})">
                        🗑️ Eliminar registro
                    </button>
                </div>
            `;
        });

        lista.innerHTML += `
            <div class="card">
                <h3>${p.nombre}</h3>
                <p>ID: ${p.id}</p>
                <p>Edad: ${p.edad}</p>

                <button onclick="nuevoRegistro(${i})">
                    ➕ Registro
                </button>

                <button class="btn-eliminar" onclick="eliminarPaciente(${i})">
                    🗑️ Eliminar paciente
                </button>

                ${hist}
            </div>
        `;
    });
}

// GUARDAR
function guardarDatos(){
    localStorage.setItem("pacientes", JSON.stringify(pacientes));
}

// VOLVER
function volver(){
    window.location.href = "index.html";
}

// INICIO
mostrarPacientes();

</script>

</body>
</html>
