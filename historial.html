<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Clínico PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNmNtKELNgO40l4wJKq6iNjwlEDPLQ1D8",
  authDomain: "psicohealt-3cbbd.firebaseapp.com",
  projectId: "psicohealt-3cbbd",
  storageBucket: "psicohealt-3cbbd.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();
</script>

<style>
body {font-family: Arial; margin:0; background:#f0f4f8;}
header {background:#0288d1;color:white;padding:15px;display:flex;justify-content:space-between;}
button {padding:8px;border:none;border-radius:8px;cursor:pointer;background:#0288d1;color:white;margin:3px;}
.container {padding:20px;}
.card {background:white;margin:10px;padding:15px;border-radius:10px;}
</style>
</head>

<body>
<header>
<h3>Pacientes</h3>
<button onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">
<input id="nombre" placeholder="Nombre">
<input id="edad" type="number" placeholder="Edad">
<button onclick="crearPaciente()">Guardar</button>

<div id="lista"></div>
</div>

<script>
let pacientes=[];

auth.onAuthStateChanged(user=>{
 if(!user) location.href="index.html";
 else cargarPacientes();
});

function logout(){auth.signOut();}

async function crearPaciente(){
 let nombre=document.getElementById("nombre").value.trim();
 let edad=parseInt(document.getElementById("edad").value);
 if(!nombre||edad<=0)return alert("Datos inválidos");

 let user=auth.currentUser;
 await db.collection("usuarios").doc(user.uid).collection("pacientes").add({
  nombre,edad,foto:"",archivos:[],historial:[]
 });
 cargarPacientes();
}

async function cargarPacientes(){
 let user=auth.currentUser;
 let snap=await db.collection("usuarios").doc(user.uid).collection("pacientes").get();
 pacientes=[];
 snap.forEach(d=>pacientes.push({id:d.id,...d.data()}));
 mostrar();
}

function mostrar(){
 let lista=document.getElementById("lista");
 lista.innerHTML="";
 pacientes.forEach(p=>{
  lista.innerHTML+=`
  <div class="card">
   <b>${p.nombre}</b> (${p.edad})<br>
   <button onclick="abrirPaciente('${p.id}')">Ver expediente</button>
  </div>`;
 });
}

function abrirPaciente(id){
 localStorage.setItem("pacienteID",id);
 location.href="paciente.html";
}
</script>

</body>
</html>

<!-- ================== PAGINA PACIENTE ================== -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Paciente</title>
</head>
<body>

<button onclick="volver()">⬅ Volver</button>

<h2 id="nombre"></h2>

<input type="file" onchange="subirFoto(event)">
<br><img id="foto" width="120">

<h3>Subir PDF</h3>
<input type="file" onchange="subirArchivo(event)">

<div id="archivos"></div>

<script>
const id=localStorage.getItem("pacienteID");
const user=auth.currentUser;

async function cargar(){
 let doc=await db.collection("usuarios").doc(user.uid).collection("pacientes").doc(id).get();
 let data=doc.data();
 document.getElementById("nombre").innerText=data.nombre;
 document.getElementById("foto").src=data.foto||"";

 let html="";
 (data.archivos||[]).forEach(a=>{
  html+=`<a href="${a}" target="_blank">📄 Ver PDF</a><br>`;
 });
 document.getElementById("archivos").innerHTML=html;
}

async function subirFoto(e){
 let file=e.target.files[0];
 let ref=storage.ref(`fotos/${id}`);
 await ref.put(file);
 let url=await ref.getDownloadURL();
 await db.collection("usuarios").doc(user.uid).collection("pacientes").doc(id).update({foto:url});
 cargar();
}

async function subirArchivo(e){
 let file=e.target.files[0];
 let ref=storage.ref(`archivos/${id}/${file.name}`);
 await ref.put(file);
 let url=await ref.getDownloadURL();

 let doc=await db.collection("usuarios").doc(user.uid).collection("pacientes").doc(id).get();
 let data=doc.data();
 let arr=data.archivos||[];
 arr.push(url);

 await db.collection("usuarios").doc(user.uid).collection("pacientes").doc(id).update({archivos:arr});
 cargar();
}

function volver(){history.back();}

cargar();
</script>

</body>
</html>
