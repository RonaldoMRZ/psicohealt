<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNmNtKELNgO40l4wJKq6iNjwlEDPLQ1D8",
  authDomain: "psicohealt-3cbbd.firebaseapp.com",
  projectId: "psicohealt-3cbbd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body {font-family: Arial; background:#f0f4f8; margin:0;}
header {background:#0288d1;color:white;padding:15px;display:flex;justify-content:space-between;}
button {padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}
.btn-home {background:white;color:#0288d1;}
.btn-logout {background:red;color:white;}
.container {padding:20px;text-align:center;}
input, textarea {padding:10px;margin:5px;width:250px;border-radius:6px;border:1px solid #ccc;}
.card {background:white;margin:15px auto;padding:15px;border-radius:10px;width:340px;text-align:left;}
.historial {background:#ffe0e0;padding:10px;margin-top:10px;border-radius:8px;}
.btn-eliminar {background:red;color:white;}
</style>
</head>

<body>

<header>
<button class="btn-home" onclick="window.location.href='index.html'">🏠 Home</button>
<h3>Historial</h3>
<button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">

<h3>Agregar paciente</h3>
<input id="nombre" placeholder="Nombre">
<input id="edad" type="number" placeholder="Edad">
<button onclick="crearPaciente()">Guardar</button>

<h3>Buscar</h3>
<input id="busqueda" onkeyup="buscarPaciente()" placeholder="Buscar">

<div id="lista"></div>

</div>

<script>

let pacientes = [];

// 🔐 SESIÓN SEGURA
auth.onAuthStateChanged(async user=>{
    if(!user){
        alert("Debes iniciar sesión");
        window.location.href = "index.html";
    } else {
        console.log("Usuario activo:", user.uid);
        await cargarDatos();
    }
});

// LOGOUT
function logout(){
    auth.signOut();
}

// ID
function generarID(){
    return "PAC-"+Date.now();
}

// 💾 GUARDAR
async function guardarDatos(){
    try{
        const user = auth.currentUser;
        if(!user) return;

        await db.collection("usuarios")
        .doc(user.uid)
        .set({ pacientes }, { merge:true });

        console.log("Guardado OK");

    }catch(e){
        console.error("Error guardando:", e);
        alert("Error al guardar: " + e.message);
    }
}

// 📥 CARGAR
async function cargarDatos(){
    try{
        const user = auth.currentUser;
        if(!user) return;

        const doc = await db.collection("usuarios")
        .doc(user.uid)
        .get();

        if(doc.exists){
            pacientes = doc.data().pacientes || [];
        } else {
            pacientes = [];
        }

        console.log("Datos cargados:", pacientes);

        mostrarPacientes();

    }catch(e){
        console.error("Error cargando:", e);
        alert("Error al cargar datos: " + e.message);
    }
}

// CREAR PACIENTE
async function crearPaciente(){
    let nombre = document.getElementById("nombre").value;
    let edad = document.getElementById("edad").value;

    if(!nombre || !edad) return alert("Completa los datos");

    pacientes.push({
        id: generarID(),
        nombre,
        edad,
        historial:[]
    });

    document.getElementById("nombre").value="";
    document.getElementById("edad").value="";

    await guardarDatos();
    mostrarPacientes();
}

// NUEVO REGISTRO
function nuevoRegistro(i){
    document.getElementById("form-"+i).innerHTML = `
        <input id="no${i}" placeholder="No puede hacer"><br>
        <textarea id="obs${i}" placeholder="Observaciones"></textarea><br>
        <button onclick="guardarRegistro(${i})">Guardar</button>
    `;
}

// GUARDAR REGISTRO
async function guardarRegistro(i){
    let no = document.getElementById("no"+i).value;
    let obs = document.getElementById("obs"+i).value;

    if(!no && !obs) return;

    pacientes[i].historial.push({
        fecha: new Date().toLocaleDateString(),
        noPuede: no,
        obs
    });

    await guardarDatos();
    mostrarPacientes();
}

// ELIMINAR
async function eliminarPaciente(i){
    if(!confirm("Eliminar paciente?")) return;
    pacientes.splice(i,1);
    await guardarDatos();
    mostrarPacientes();
}

async function eliminarRegistro(p,r){
    if(!confirm("Eliminar registro?")) return;
    pacientes[p].historial.splice(r,1);
    await guardarDatos();
    mostrarPacientes();
}

// BUSCAR
function buscarPaciente(){
    let t = document.getElementById("busqueda").value.toLowerCase();
    mostrarPacientes(t);
}

// MOSTRAR
function mostrarPacientes(filtro=""){
    let lista = document.getElementById("lista");
    lista.innerHTML="";

    pacientes.forEach((p,i)=>{
        if(p.nombre.toLowerCase().includes(filtro) || p.id.toLowerCase().includes(filtro)){

            let hist="";
            p.historial.forEach((h,j)=>{
                hist+=`
                <div class="historial">
                    <b>${h.fecha}</b><br>
                    ❌ ${h.noPuede}<br>
                    📝 ${h.obs}<br>
                    <button class="btn-eliminar" onclick="eliminarRegistro(${i},${j})">Eliminar</button>
                </div>`;
            });

            lista.innerHTML+=`
            <div class="card">
                <h3>${p.nombre}</h3>
                ID: ${p.id}<br>
                Edad: ${p.edad}<br>

                <button onclick="nuevoRegistro(${i})">➕ Registro</button>
                <button class="btn-eliminar" onclick="eliminarPaciente(${i})">🗑️</button>

                <div id="form-${i}"></div>

                ${hist}
            </div>`;
        }
    });
}
</script>

</body>
</html>
